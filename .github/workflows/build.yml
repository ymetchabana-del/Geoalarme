name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Prepare web folder
        run: |
          mkdir -p www
          cp index.html manifest.json sw.js icon-192.png icon-512.png www/

      - name: Write capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.edy.geoalarme",
            "appName": "GeoAlarme",
            "webDir": "www",
            "plugins": {
              "BackgroundGeolocation": {
                "backgroundMessage": "GeoAlarme está a verificar a tua posição.",
                "backgroundTitle": "GeoAlarme activo",
                "requestPermissions": true,
                "stale": false,
                "distanceFilter": 15
              }
            }
          }
          EOF

      - name: Install Capacitor + background GPS plugin
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/android@5.7.4 @capacitor/cli@5.7.4
          npm install @capacitor-community/background-geolocation@1.2.3

      - name: Add Android platform
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Fix Gradle + Kotlin versions
        run: |
          cd android
          sed -i 's/distributionUrl=.*/distributionUrl=https\\:\/\/services.gradle.org\/distributions\/gradle-8.2.1-bin.zip/' gradle/wrapper/gradle-wrapper.properties
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.10"/' build.gradle

      - name: Add GPS permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />|' "$MANIFEST"
          sed -i 's|</application>|    <service android:name="com.equimaps.capacitorbackgroundgeolocation.BackgroundGeolocationService" android:enabled="true" android:exported="false" android:foregroundServiceType="location" />\n    </application>|' "$MANIFEST"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoAlarme-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
